<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern QR Generator</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>


<body>


    <!-- Animated Background -->
    <div class="background-orbs">

        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

    </div>



    <main class="container">


        <section class="glass-card fade-in-up">


            <header>

                <div class="logo">
                    QR
                </div>


                <h1>
                    QR Code Generator
                </h1>


                <p class="subtitle">
                    Generate beautiful QR codes instantly
                </p>


            </header>





            <div class="input-group">


                <label>
                    🔗 Enter Website URL
                </label>


                <input
                    type="url"
                    class="url-input"
                    placeholder="https://example.com"
                    autocomplete="off">



                <small class="error-message"></small>




                <button class="btn primary generate-btn">

                    ✨ Generate QR Code

                </button>



            </div>






            <div class="qr-placeholder shimmer">


                <div class="qr-icon">


                    <svg xmlns="http://www.w3.org/2000/svg"
                        width="70"
                        height="70"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">


                        <rect x="3" y="3" width="7" height="7"></rect>

                        <rect x="14" y="3" width="7" height="7"></rect>

                        <rect x="3" y="14" width="7" height="7"></rect>

                        <rect x="14" y="14" width="7" height="7"></rect>


                    </svg>


                </div>


            </div>







            <div class="actions">


                <button class="btn primary download-btn" disabled>

                    ⬇ Download QR

                </button>



                <button class="btn secondary clear-btn">

                    🗑 Clear

                </button>




                <button class="btn secondary share-btn">

                    📤 Share Link

                </button>



            </div>



        </section>



    </main>





    <script src="script.js"></script>


</body>


</html>
